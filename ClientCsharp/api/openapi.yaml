              $ref: '#/components/schemas/ShowDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ShowDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ShowDto'
      responses:
        "200":
          content:
            text/plain:
              schema:
                format: int32
                type: integer
            application/json:
              schema:
                format: int32
                type: integer
            text/json:
              schema:
                format: int32
                type: integer
          description: Success
      tags:
      - Show
  /api/shows/{idShow}:
    get:
      parameters:
      - explode: false
        in: path
        name: idShow
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ShowDto'
            application/json:
              schema:
                $ref: '#/components/schemas/ShowDto'
            text/json:
              schema:
                $ref: '#/components/schemas/ShowDto'
          description: Success
      tags:
      - Show
    put:
      parameters:
      - explode: false
        in: path
        name: idShow
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ShowDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ShowDto'
      responses:
        "200":
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ShowDto'
            application/json:
              schema:
                $ref: '#/components/schemas/ShowDto'
            text/json:
              schema:
                $ref: '#/components/schemas/ShowDto'
          description: Success
      tags:
      - Show
components:
  schemas:
    AlarmDto:
      additionalProperties: false
      example:
        dateTimeMailSent: 2000-01-23T04:56:07.000+00:00
        dateTimeTextSent: 2000-01-23T04:56:07.000+00:00
        mail: mail
        phone: phone
        dateTimeMailRequest: 2000-01-23T04:56:07.000+00:00
        idShow: 0
        dateTimeTextRequest: 2000-01-23T04:56:07.000+00:00
      properties:
        idShow:
          format: int32
          type: integer
        mail:
          nullable: true
          type: string
        phone:
          nullable: true
          type: string
        dateTimeMailRequest:
          format: date-time
          type: string
        dateTimeMailSent:
          format: date-time
          type: string
        dateTimeTextRequest:
          format: date-time
          type: string
        dateTimeTextSent:
          format: date-time
          type: string
      type: object
    ArtistDto:
      additionalProperties: false
      example:
        urlPhoto: urlPhoto
        name: name
      properties:
        name:
          nullable: true
          type: string
        urlPhoto:
          nullable: true
          type: string
      type: object
    AvailabilityDto:
      additionalProperties: false
      example:
        id: 0
        dateTimeAvailability: 2000-01-23T04:56:07.000+00:00
        idShow: 6
      properties:
        id:
          format: int32
          type: integer
        idShow:
          format: int32
          type: integer
        dateTimeAvailability:
          format: date-time
          type: string
      type: object
    ShowDto:
      additionalProperties: false
      example:
        idArtist: 6
        dateTimeShow: 2000-01-23T04:56:07.000+00:00
        city: city
        artist:
          urlPhoto: urlPhoto
          name: name
        available: true
        idFnac: 1
        id: 0
        arena: arena
        title: title
        url: url
      properties:
        id:
          format: int32
          type: integer
        idArtist:
          format: int32
          type: integer
        title:
          nullable: true
          type: string
        dateTimeShow:
          format: date-time
          type: string
        idFnac:
          format: int32
          type: integer
        city:
          nullable: true
          type: string
        arena:
          nullable: true
          type: string
        url:
          nullable: true
          type: string
        available:
          type: boolean
        artist:
          $ref: '#/components/schemas/ArtistDto'
      type: object

