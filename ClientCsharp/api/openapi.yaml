openapi: 3.0.1
info:
  title: TicketAlarm.API
  version: "1.0"
servers:
- url: /
paths:
  /api/alarms:
    get:
      parameters:
      - explode: true
        in: query
        name: idShow
        required: false
        schema:
          format: int32
          type: integer
        style: form
      responses:
        "200":
          content:
            text/plain:
              schema:
                items:
                  $ref: '#/components/schemas/ShowDto'
                type: array
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ShowDto'
                type: array
            text/json:
              schema:
                items:
                  $ref: '#/components/schemas/ShowDto'
                type: array
          description: Success
      tags:
      - Alarm
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlarmDto'
          text/json:
            schema:
              $ref: '#/components/schemas/AlarmDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/AlarmDto'
      responses:
        "200":
          content:
            text/plain:
              schema:
                format: int32
                type: integer
            application/json:
              schema:
                format: int32
                type: integer
            text/json:
              schema:
                format: int32
                type: integer
          description: Success
      tags:
      - Alarm
  /api/alarms/{idAlarm}:
    put:
      parameters:
      - explode: false
        in: path
        name: idAlarm
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlarmDto'
          text/json:
            schema:
              $ref: '#/components/schemas/AlarmDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/AlarmDto'
      responses:
        "200":
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ShowDto'
            application/json:
              schema:
                $ref: '#/components/schemas/ShowDto'
            text/json:
              schema:
                $ref: '#/components/schemas/ShowDto'
          description: Success
      tags:
      - Alarm
  /api/artists:
    get:
      responses:
        "200":
          content:
            text/plain:
              schema:
                items:
                  $ref: '#/components/schemas/ArtistDto'
                type: array
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ArtistDto'
                type: array
            text/json:
              schema:
                items:
                  $ref: '#/components/schemas/ArtistDto'
                type: array
          description: Success
      tags:
      - Artist
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ArtistDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ArtistDto'
      responses:
        "200":
          content:
            text/plain:
              schema:
                format: int32
                type: integer
            application/json:
              schema:
                format: int32
                type: integer
            text/json:
              schema:
                format: int32
                type: integer
          description: Success
      tags:
      - Artist
  /api/availabilitys:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityDto'
          text/json:
            schema:
              $ref: '#/components/schemas/AvailabilityDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/AvailabilityDto'
      responses:
        "200":
          content:
            text/plain:
              schema:
                items:
                  format: int32
                  type: integer
                type: array
            application/json:
              schema:
                items:
                  format: int32
                  type: integer
                type: array
            text/json:
              schema:
                items:
                  format: int32
                  type: integer
                type: array
          description: Success
      tags:
      - Availability
  /api/shows:
    get:
      parameters:
      - explode: true
        in: query
        name: active
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            text/plain:
              schema:
                items:
                  $ref: '#/components/schemas/ShowDto'
                type: array
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ShowDto'
                type: array
            text/json:
              schema:
                items:
                  $ref: '#/components/schemas/ShowDto'
                type: array
          description: Success
      tags:
